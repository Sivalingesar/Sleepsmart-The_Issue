<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepSmart Inc. | Student Alertness Study</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&display=swap');

        :root {
            --electric-border-color: #02A2F8;
            --electric-light-color: oklch(from var(--electric-border-color) l c h);
            --gradient-color: oklch(from var(--electric-border-color) 0.3 calc(c / 2) h / 0.4);
            --color-neutral-900: #1a1c2c; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Oswald", sans-serif;
            background-color: transparent;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .svg-container { position: absolute; width: 0; height: 0; }

        .card-container {
            padding: 2px;
            border-radius: 24px;
            position: relative;
            background: linear-gradient(-30deg, var(--gradient-color), transparent, var(--gradient-color)),
                        linear-gradient(to bottom, var(--color-neutral-900), var(--color-neutral-900));
        }

        .main-card {
            width: 500px; 
            height: 650px; 
            border-radius: 24px;
            border: 2px solid var(--electric-border-color);
            filter: url(#turbulent-displace);
        }

        .glow-layer-1 { border: 2px solid #02A2F8; border-radius: 24px; width: 100%; height: 100%; position: absolute; top: 0; left: 0; filter: blur(1px); }


        .background-glow {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 24px;
            filter: blur(32px); transform: scale(1.1); opacity: 0.3; z-index: -1;
            background: linear-gradient(-30deg, var(--electric-light-color), transparent, var(--electric-border-color));
        }

        .content-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px;
            align-items: center;
        }

        .scrollbar-glass {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 6px 14px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-align: center;
        }

        .chart {
            width: 350px;
            height: 350px;
            position: relative;
        }

        .pieTip {
            position: absolute;
            padding: 10px 18px;
            border-radius: 4px;
            background: white;
            color: #1a1c2c;
            font-family: "Oswald", sans-serif;
            font-size: 16px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 1000;
            line-height: 1.2;
        }

        .figure-caption {
            margin-top: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            color: rgb(255, 255, 255);
            text-transform: uppercase;
            text-align: center;
            line-height: 1.6;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart path { cursor: pointer; }
    </style>
</head>
<body>

<main>
    <svg class="svg-container">
        <defs>
            <filter id="turbulent-displace" colorInterpolationFilters="sRGB" x="-20%" y="-20%" width="140%" height="140%">
                <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise1" seed="1" />
                <feOffset in="noise1" dx="0" dy="0" result="offsetNoise1">
                    <animate attributeName="dy" values="700; 0" dur="6s" repeatCount="indefinite" />
                </feOffset>
                <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise2" seed="1" />
                <feOffset in="noise2" dx="0" dy="0" result="offsetNoise2">
                    <animate attributeName="dy" values="0; -700" dur="6s" repeatCount="indefinite" />
                </feOffset>
                <feBlend in="offsetNoise1" in2="offsetNoise2" mode="color-dodge" result="combinedNoise" />
                <feDisplacementMap in="SourceGraphic" in2="combinedNoise" scale="30" xChannelSelector="R" yChannelSelector="B" />
            </filter>
        </defs>
    </svg>

    <div class="card-container">
        <div class="inner-container">
            <div class="main-card"></div>
            <div class="glow-layer-1"></div>
            <div class="glow-layer-2"></div>
        </div>

        <div class="background-glow"></div>

        <div class="content-container">
            <div class="scrollbar-glass">Independent Study</div>
            <h1>Student Alertness Levels</h1>
            
            <div id="alertChart" class="chart"></div>

            <p class="figure-caption">
                Figure 2: Independent Study by Sleepsmart Inc. observing perceived alertness levels of high school students during school hours.
            </p>
        </div>
    </div>
</main>

<script>
    (function($) {
        $.fn.drawPieChart = function(data, options) {
            var $this = this, W = $this.width(), H = $this.height(),
                centerX = W / 2, centerY = H / 2, cos = Math.cos, sin = Math.sin, PI = Math.PI,
                settings = $.extend({
                    segmentStrokeColor: "#1a1c2c",
                    segmentStrokeWidth: 2,
                    edgeOffset: 30,
                    animationSteps: 90
                }, options);

            var pieRadius = Math.min(H / 2, W / 2) - settings.edgeOffset;
            var segmentTotal = data.reduce((a, b) => a + b.value, 0);
            var $wrapper = $('<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg"></svg>').appendTo($this);
            var $pathGroup = $(document.createElementNS('http://www.w3.org/2000/svg', 'g')).appendTo($wrapper).attr("opacity", 0);
            var $tip = $('<div class="pieTip" />').appendTo('body').hide();
            var $pies = [], $lightPies = [];

            data.forEach((d, i) => {
                var $g = $(document.createElementNS('http://www.w3.org/2000/svg', 'g')).appendTo($pathGroup)
                    .on("mouseenter", function(e) {
                        $tip.html(d.title + "<br><strong>" + d.value + "%</strong><br><small>Count: " + d.count + "</small>").fadeIn(200);
                    })
                    .on("mouseleave", function() { $tip.hide(); })
                    .on("mousemove", function(e) {
                        $tip.css({ top: e.pageY - 70, left: e.pageX - $tip.outerWidth() / 2 });
                    });

                $pies[i] = $(document.createElementNS('http://www.w3.org/2000/svg', 'path')).appendTo($g).attr({
                    "fill": d.color, "stroke": settings.segmentStrokeColor, "stroke-width": settings.segmentStrokeWidth
                });
                $lightPies[i] = $(document.createElementNS('http://www.w3.org/2000/svg', 'path')).appendTo($g).attr({
                    "fill": d.color, "opacity": 0.3
                });
            });

            function draw(decimal) {
                var startAngle = -PI / 2;
                $pathGroup.attr("opacity", decimal);
                data.forEach((d, i) => {
                    var angle = decimal * ((d.value / segmentTotal) * (PI * 2));
                    var endAngle = startAngle + angle;
                    var getPath = (r) => [
                        'M', centerX + cos(startAngle) * r, centerY + sin(startAngle) * r,
                        'A', r, r, 0, (angle > PI ? 1 : 0), 1, centerX + cos(endAngle) * r, centerY + sin(endAngle) * r,
                        'L', centerX, centerY, 'Z'
                    ].join(' ');
                    $pies[i].attr("d", getPath(pieRadius));
                    $lightPies[i].attr("d", getPath(pieRadius + 8));
                    startAngle += angle;
                });
            }

            let count = 0;
            function loop() {
                count += 1 / settings.animationSteps;
                draw(Math.min(count, 1));
                if (count < 1) requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        };
    })(jQuery);

    $(function() {
        $("#alertChart").drawPieChart([
            { title: "Very Tired", value: 6.10, count: 3,  color: "#B0E0E6" },
            { title: "Tired",      value: 28.60, count: 14, color: "#7FB3D5" },
            { title: "Neutral",    value: 34.70, count: 17, color: "#02A2F8" },
            { title: "Alert",      value: 18.40, count: 9,  color: "#00BFFF" },
            { title: "Very Alert", value: 12.20, count: 6,  color: "#FF7675" }
        ]);
    });
</script>

</body>
</html>
