<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    header {
      display: block;
      position: relative;
      width: 90vw; 
      height: 22vw;
    }

    h1, .copy {
      font-family: "Lilita One", cursive;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
      /* Adjusted to 16vw for a slightly more balanced fit */
      font-size: 16vw; 
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      line-height: 1;
      width: 100%;
      text-align: center;
      margin: 0;
      text-transform: uppercase;
      white-space: nowrap;
    }

    h1 {
      color: #e7e7e7;
      z-index: 50;
    }

    /* Your Blue Monochromatic Stack */
    .copy-1 { color: #02A2F8; z-index: 40; } 
    .copy-2 { color: #00b1f2af; z-index: 30; } 
    .copy-3 { color: #4f8ad1; z-index: 20; } 
    .copy-4 { color: #166894c5; z-index: 10; } 

  </style>
</head>
<body>

  <header id="text-container">
    <h1>The Issue</h1>
    <span aria-hidden="true" class="copy copy-1">The Issue</span>
    <span aria-hidden="true" class="copy copy-2">The Issue</span>
    <span aria-hidden="true" class="copy copy-3">The Issue</span>
    <span aria-hidden="true" class="copy copy-4">The Issue</span>
  </header>

  <script>
    const mouse = { x: 0, y: 0 };
    const center = { x: 0, y: 0 };
    const distance = { x: 0, y: 0 };
    const lerped = { x: 0, y: 0 };
    let isSimulating = true;

    const perspective = 500;
    const translateZ = -16; // Adjusted depth for the new size
    const rotateMult = 2.5; 
    const skewMult = 2.5;

    const container = document.getElementById("text-container");
    const copies = document.querySelectorAll(".copy");

    function getCenter() {
      const rect = container.getBoundingClientRect();
      center.x = rect.left + rect.width / 2;
      center.y = rect.top + rect.height / 2;
    }

    function onMouseMove(e) {
      isSimulating = false;
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      distance.x = center.x - mouse.x;
      distance.y = center.y - mouse.y;
    }

    function autoFloat(t) {
      distance.x = Math.sin(t / 600) * (window.innerWidth * 0.15);
      distance.y = Math.cos(t / 600) * (window.innerHeight * 0.05);
    }

    function animate(t) {
      if (isSimulating) autoFloat(t);

      lerped.x += (distance.x - lerped.x) * 0.15;
      lerped.y += (distance.y - lerped.y) * 0.15;

      copies.forEach((copy, i) => {
        const index = i + 1;
        const y = index * lerped.y * 0.035;
        const z = index * translateZ;
        const r = index * rotateMult * (lerped.x * 0.001);
        const s = index * skewMult * (lerped.x * 0.001);

        copy.style.transform = `translate(-50%, -50%) perspective(${perspective}px) translate3d(0px, ${y}px, ${z}px) rotate(${r}deg) skew(${s}deg)`;
      });

      document.querySelector('h1').style.transform = `translate(-50%, -50%)`;

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", getCenter);
    document.addEventListener("mousemove", onMouseMove);
    
    getCenter();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
