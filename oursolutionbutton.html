<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Buttons</title>


    <style>
        body {
        background-color: transparent;
        align-content: center;
        
        }

.center-text {
  text-align: center;
}

        .grid > div {
        height: 78px;
        }

        .frame {
        align-items: center;      /* vertical center */
        }

        .frame header {
        top: -60px;
        }

        .frame h3 {
        bottom: -30px;
        }

        button {
        font-family: inherit;
        }


        /* btn-3 */

        .btn-3 {
        scale: 1;
        line-height: 1;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        background-color: #166894c5;
        color: #fff;
        border-radius: 10rem;
        font-weight: 600;
        font-size: 14px;
        font-family: arial;
        padding: 12px 24px 12px 16px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: background-color 0.3s;
        }

        .btn-3 .button__icon-wrapper {
        flex-shrink: 0;
        width: 25px;
        height: 25px;
        position: relative;
        color: var(--clr);
        background-color: #fff;
        border-radius: 50%;
        display: grid;
        place-items: center;
        overflow: hidden;
        }

        .btn-3:hover {
        background-color: #02A2F8;
        }

        .btn-3:hover .button__icon-wrapper {
        color: #02A2F8;
        }

        .btn-3 .button__icon-svg--copy {
        position: absolute;
        transform: translate(-150%, 150%);
        }

        .btn-3:hover .button__icon-svg:first-child {
        transition: transform 0.3s ease-in-out;
        transform: translate(150%, -150%);
        }

        .btn-3:hover .button__icon-svg--copy {
        transition: transform 0.3s ease-in-out 0.1s;
        transform: translate(0);
        }
    </style>

  </head>
  <body>
    <div class="frame">
      <header>
      </header>
      <div >
        <div>
        <div align="center">
         <a style="--clr: #000" class="btn-3" href="https://sites.google.com/education.nsw.gov.au/sleepsmart/our-solution?authuser=1" target="_blank">
            <span class="button__icon-wrapper">
              <svg
                width="10"
                class="button__icon-svg"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 14 15"
              >
                <path
                  fill="currentColor"
                  d="M13.376 11.552l-.264-10.44-10.44-.24.024 2.28 6.96-.048L.2 12.56l1.488 1.488 9.432-9.432-.048 6.912 2.304.024z"
                >siva</path>
              </svg>

              <svg
                class="button__icon-svg button__icon-svg--copy"
                xmlns="http://www.w3.org/2000/svg"
                width="10"
                fill="none"
                viewBox="0 0 14 15"
              >
                <path
                  fill="currentColor"
                  d="M13.376 11.552l-.264-10.44-10.44-.24.024 2.28 6.96-.048L.2 12.56l1.488 1.488 9.432-9.432-.048 6.912 2.304.024z"
                ></path>
              </svg>
            </span>
            Our Solution
          </a>
        </div>
        <div>
          </button>
        </div>
 
    </div>
  </body>
</html>
